<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>富士山 – 資料ページ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%);
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    header .icon { font-size: 30px; }

    header h1 { font-size: 20px; font-weight: 600; }
    header p  { font-size: 13px; opacity: 0.8; margin-top: 2px; }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .doc-info { display: flex; align-items: center; gap: 10px; }

    .pdf-icon {
      width: 38px; height: 38px;
      background: #e53935;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 13px;
    }

    .doc-name { font-weight: 600; font-size: 15px; color: #1a237e; }
    .doc-meta { font-size: 12px; color: #888; margin-top: 2px; }

    .btn-download {
      display: inline-flex; align-items: center; gap: 6px;
      background: #3949ab; color: white;
      text-decoration: none;
      padding: 8px 18px; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      transition: background 0.2s;
    }
    .btn-download:hover { background: #1a237e; }

    .pdf-viewer {
      width: 100%; height: 78vh;
      min-height: 500px;
      border: none; display: block;
      background: #525659;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <div class="icon">🗻</div>
    <div>
      <h1>富士山 資料ページ</h1>
      <p>日本の象徴 – 霊峰富士の全貌</p>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="doc-info">
          <div class="pdf-icon">PDF</div>
          <div>
            <div class="doc-name">富士山 – 信仰と自然の霊峰</div>
            <div class="doc-meta">fuji.pdf &nbsp;•&nbsp; 2ページ &nbsp;•&nbsp; 2026年4月作成</div>
          </div>
        </div>
        <a href="../fuji.pdf" download class="btn-download">⬇ ダウンロード</a>
      </div>

      <embed
        src="../fuji.pdf"
        type="application/pdf"
        class="pdf-viewer"
      >
    </div>
  </div>

  <footer>© 2026 · 富士山資料センター</footer>

</body>
</html>
